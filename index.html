<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAMOJACK</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#050506">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Black+Ops+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">

    <header id="topbar">
      <div class="logo">CAMO<span>//</span>JACK</div>

      <div id="toolbar">
        <!-- paint tools -->
        <button class="tool-btn active" data-tool="brush" title="Brush [B]">Brush</button>
        <button class="tool-btn" data-tool="eraser" title="Eraser [E]">Erase</button>
        <button class="tool-btn" data-tool="smear" title="Smear/Blend [S]">Smear</button>
        <button class="tool-btn" data-tool="clone" title="Clone Stamp [C] -- Alt+click source">Clone</button>
        <div class="toolbar-sep"></div>
        <!-- stamp tools -->
        <button class="tool-btn" data-tool="blob" title="Blob Stamp [O]">Blob</button>
        <button class="tool-btn" data-tool="spray" title="Spray [A]">Spray</button>
        <div class="toolbar-sep"></div>
        <!-- shape tools -->
        <button class="tool-btn" data-tool="line" title="Line [L] -- Shift snap">Line</button>
        <button class="tool-btn" data-tool="rect" title="Rectangle [R] -- Shift square">Rect</button>
        <button class="tool-btn" data-tool="gradient" title="Gradient [G]">Grad</button>
        <div class="toolbar-sep"></div>
        <!-- utility -->
        <button class="tool-btn" data-tool="fill" title="Flood Fill [F]">Fill</button>
        <button class="tool-btn" data-tool="picker" title="Eyedropper [P]">Pick</button>
        <div class="toolbar-sep"></div>
        <button id="btn-undo" title="Undo [Ctrl+Z]">Undo</button>
        <button id="btn-redo" title="Redo [Ctrl+Y]">Redo</button>
      </div>

      <div id="topbar-right">
        <label class="inline-label">Tile</label>
        <select id="tile-size-sel">
          <option value="256">256</option>
          <option value="512" selected>512</option>
          <option value="1024">1024</option>
        </select>
        <button id="btn-export" class="btn-accent">Export</button>
      </div>
    </header>

    <div id="workspace">

      <!-- LEFT: Pattern Presets + Generator + Blend -->
      <aside id="panel-gen" class="panel">
        <div class="section-title">PATTERN PRESET</div>
        <div class="form-row">
          <select id="pattern-preset">
            <option value="">-- Manual --</option>
            <optgroup label="Classic">
              <option value="woodland_m81">Woodland M81</option>
              <option value="dpm">DPM (UK)</option>
              <option value="tiger_stripe">Tiger Stripe</option>
              <option value="duckhunter">Duck Hunter / Frogskin</option>
              <option value="denison">Denison Smock</option>
              <option value="lizard">Lizard / TAP 47</option>
            </optgroup>
            <optgroup label="Modern">
              <option value="marpat_woodland">MARPAT Woodland</option>
              <option value="marpat_desert">MARPAT Desert</option>
              <option value="multicam">Multicam</option>
              <option value="flecktarn_preset">Flecktarn</option>
            </optgroup>
            <optgroup label="Historical">
              <option value="telo_mimetico">Telo Mimetico</option>
              <option value="splinter">Splittertarn</option>
              <option value="strichtarn">Strichtarn (Rain)</option>
              <option value="amoeba_preset">Soviet Amoeba (TTsKO)</option>
              <option value="chocolate_chip">6-Color Desert (DBDU)</option>
            </optgroup>
            <optgroup label="Novelty">
              <option value="baja_blast">Baja Blast</option>
              <option value="volcano">Volcano</option>
              <option value="zombie">Zombie</option>
              <option value="dragon_red">Dragon Red</option>
            </optgroup>
            <optgroup label="Tactical">
              <option value="kryptek_dark">Kryptek Typhon</option>
              <option value="kryptek_ocean">Kryptek Neptune</option>
              <option value="carbon_black">Carbon Fiber</option>
              <option value="honeycomb_tactical">Honeycomb Tactical</option>
            </optgroup>
          </select>
        </div>

        <div class="section-title section-gap">MY PRESETS</div>
        <div class="form-row">
          <select id="user-preset"><option value="">-- Saved --</option></select>
          <button id="btn-preset-save" title="Save current settings">Save</button>
          <button id="btn-preset-delete" title="Delete selected preset">X</button>
        </div>
        <div class="form-row">
          <button id="btn-preset-copy" title="Copy current settings as JSON">Copy JSON</button>
          <button id="btn-preset-paste" title="Paste settings JSON from clipboard">Paste JSON</button>
        </div>

        <div class="section-title section-gap">GENERATOR</div>
        <div class="form-row">
          <label>Algo</label>
          <select id="gen-algo">
            <optgroup label="Noise-based">
              <option value="voronoi">Voronoi</option>
              <option value="noise">Noise (FBM)</option>
              <option value="digital">Digital (MARPAT)</option>
            </optgroup>
            <optgroup label="Shape-based">
              <option value="blotch">Blotch</option>
              <option value="brushstroke">Brushstroke (DPM)</option>
              <option value="fleck">Fleck (Dots)</option>
            </optgroup>
            <optgroup label="Directional">
              <option value="stripe">Stripe (Tiger)</option>
              <option value="rain">Rain (Strichtarn)</option>
            </optgroup>
            <optgroup label="Geometric">
              <option value="chip">Chocolate Chip</option>
              <option value="geometric">Geometric (Angular)</option>
            </optgroup>
            <optgroup label="Layered">
              <option value="contour">Contour (Woodland)</option>
            </optgroup>
            <optgroup label="Uniform">
              <option value="honeycomb">Honeycomb</option>
              <option value="carbon">Carbon Fiber</option>
            </optgroup>
          </select>
        </div>

        <div class="form-row seed-row">
          <label>Seed</label>
          <input type="number" id="gen-seed" min="0" max="65535" value="1337">
          <button id="btn-rand-seed" title="Randomize seed">&#8635;</button>
        </div>

        <div class="form-row">
          <label for="gen-tileable" title="Wrap noise fields so the tile repeats seamlessly">Seamless</label>
          <input type="checkbox" id="gen-tileable" checked>
        </div>

        <div id="gen-params"></div>

        <div class="btn-stack">
          <button id="btn-generate" class="btn-accent">Generate</button>
          <button id="btn-vary" title="Re-run with params nudged by +/-10%">Vary</button>
          <button id="btn-randomize">Randomize All</button>
        </div>

        <div class="section-title section-gap">PATTERN BLEND</div>
        <div class="blend-captures">
          <div class="blend-slot">
            <button id="btn-capture-a">Capture A</button>
            <canvas id="blend-thumb-a" class="blend-thumb"></canvas>
          </div>
          <div class="blend-slot">
            <button id="btn-capture-b">Capture B</button>
            <canvas id="blend-thumb-b" class="blend-thumb"></canvas>
          </div>
        </div>
        <div class="form-row">
          <label>Mode</label>
          <select id="blend-mode">
            <option value="normal">Normal</option>
            <option value="multiply">Multiply</option>
            <option value="screen">Screen</option>
            <option value="overlay">Overlay</option>
            <option value="soft-light">Soft Light</option>
            <option value="difference">Difference</option>
          </select>
        </div>
        <div class="slider-row">
          <label>Mix</label>
          <div class="slider-track"><input type="range" id="blend-mix" min="0" max="100" value="50"></div>
          <span class="sl-val" id="blend-mix-val">50%</span>
        </div>
        <button id="btn-apply-blend" class="btn-accent" style="width:100%">Apply Blend</button>

        <div class="section-title section-gap">TILE PREVIEW</div>
        <div class="form-row">
          <label>Repeat</label>
          <select id="preview-repeat">
            <option value="2">2 x 2</option>
            <option value="3" selected>3 x 3</option>
            <option value="4">4 x 4</option>
            <option value="5">5 x 5</option>
            <option value="6">6 x 6</option>
            <option value="7">7 x 7</option>
            <option value="8">8 x 8</option>
          </select>
        </div>
        <canvas id="preview-canvas" width="228" height="228"></canvas>
        <div id="preview-label">3 x 3 tile repeat</div>
      </aside>

      <!-- CENTER: Canvas -->
      <main id="canvas-area">
        <div id="canvas-wrap">
          <canvas id="tile-canvas"></canvas>
          <canvas id="cursor-overlay"></canvas>
        </div>
        <div id="canvas-statusbar">
          <span id="canvas-coords">x: ---  y: ---</span>
          <span id="canvas-hint"></span>
          <span id="canvas-dim">512 x 512</span>
        </div>
      </main>

      <!-- RIGHT: Palette + Brush -->
      <aside id="panel-right" class="panel">
        <div class="section-title">PALETTE</div>
        <div class="form-row">
          <select id="palette-preset">
            <optgroup label="Military">
              <option value="woodland">Woodland M81</option>
              <option value="dpm">DPM (UK)</option>
              <option value="desert">Desert 3-Color</option>
              <option value="desert6">6-Color Desert</option>
              <option value="marpat_w">MARPAT Woodland</option>
              <option value="marpat_d">MARPAT Desert</option>
              <option value="multicam">Multicam</option>
              <option value="aor1">AOR-1 Desert</option>
              <option value="aor2">AOR-2 Woodland</option>
              <option value="tigerstripe">Tiger Stripe</option>
              <option value="flecktarn">Flecktarn</option>
              <option value="amoeba">Soviet Amoeba</option>
              <option value="frogskin">Frogskin (WWII)</option>
              <option value="strichtarn">Strichtarn</option>
              <option value="telo">Telo Mimetico</option>
              <option value="splinter">Splittertarn</option>
              <option value="denison">Denison Smock</option>
              <option value="lizard">Lizard / TAP 47</option>
              <option value="urban">Urban / Ghost</option>
              <option value="alpine">Alpine</option>
              <option value="kryptek_typhon">Kryptek Typhon</option>
              <option value="kryptek_neptune">Kryptek Neptune</option>
              <option value="kryptek_highlander">Kryptek Highlander</option>
            </optgroup>
            <optgroup label="Novelty">
              <option value="bajablast">Baja Blast</option>
              <option value="volcano">Volcano</option>
              <option value="zombie">Zombie</option>
              <option value="dragon">Dragon Red</option>
            </optgroup>
            <optgroup label="Biome">
              <option value="biome_temperate">Temperate Forest</option>
              <option value="biome_boreal">Boreal / Conifer</option>
              <option value="biome_tropical">Tropical Jungle</option>
              <option value="biome_arid">Arid Desert</option>
              <option value="biome_semiarid">Semi-Arid Scrub</option>
              <option value="biome_arctic">Arctic / Snow</option>
              <option value="biome_urban">Urban Concrete</option>
              <option value="biome_coastal">Coastal / Maritime</option>
              <option value="biome_savanna">Savanna / Grassland</option>
              <option value="biome_marsh">Wetland / Marsh</option>
            </optgroup>
            <option value="custom">-- Custom --</option>
          </select>
        </div>

        <div id="palette-swatches"></div>

        <div class="form-row">
          <label for="palette-lock" title="When checked, Randomize All keeps the current palette">Lock</label>
          <input type="checkbox" id="palette-lock">
        </div>

        <div class="form-row">
          <select id="random-biome">
            <option value="temperate">Temperate</option>
            <option value="boreal">Boreal</option>
            <option value="tropical">Tropical</option>
            <option value="arid">Arid</option>
            <option value="arctic">Arctic</option>
            <option value="urban">Urban</option>
            <option value="coastal">Coastal</option>
            <option value="savanna">Savanna</option>
            <option value="marsh">Marsh</option>
          </select>
          <button id="btn-random-palette" title="Generate random palette for biome">Random</button>
        </div>

        <div class="section-title section-gap">FROM IMAGE</div>
        <div id="img-upload-area">
          <label id="img-upload-label" for="img-upload">Drop image or click to load</label>
          <input type="file" id="img-upload" accept="image/*">
          <canvas id="img-preview" width="200" height="100"></canvas>
          <button id="btn-extract-palette" disabled>Extract Palette</button>
        </div>

        <div class="section-title section-gap">ACTIVE COLOR</div>
        <div id="color-preview-wrap">
          <div id="color-preview"></div>
          <div id="color2-preview" title="Secondary color (Alt+click swatch, X to swap)"></div>
          <button id="btn-swap-colors" title="Swap colors [X]">X</button>
          <div id="hex-row">
            <span class="hex-hash">#</span>
            <input type="text" id="hex-input" maxlength="6" spellcheck="false">
          </div>
        </div>

        <div class="hsl-sliders">
          <div class="slider-row">
            <label>H</label>
            <div class="slider-track hue-track"><input type="range" id="hue-sl" min="0" max="360" value="100"></div>
            <span class="sl-val" id="hue-val">100</span>
          </div>
          <div class="slider-row">
            <label>S</label>
            <div class="slider-track"><input type="range" id="sat-sl" min="0" max="100" value="35"></div>
            <span class="sl-val" id="sat-val">35</span>
          </div>
          <div class="slider-row">
            <label>L</label>
            <div class="slider-track"><input type="range" id="lit-sl" min="0" max="100" value="28"></div>
            <span class="sl-val" id="lit-val">28</span>
          </div>
        </div>

        <div class="section-title section-gap">BRUSH</div>
        <div class="form-row">
          <label>Tip</label>
          <select id="brush-shape">
            <option value="circle">Circle</option>
            <option value="square">Square</option>
            <option value="pixel">Pixel (1px)</option>
          </select>
        </div>

        <div class="section-title section-gap">BLOB TOOL</div>
        <div class="form-row">
          <label>Style</label>
          <select id="blob-style" title="Blob edge character">
            <option value="organic">Organic</option>
            <option value="jagged">Jagged</option>
            <option value="cloud">Cloud</option>
            <option value="splat">Splat</option>
            <option value="elongated">Elongated</option>
          </select>
        </div>
        <div class="form-row">
          <label>Action</label>
          <select id="blob-mode" title="How the blob is applied">
            <option value="paint">Paint (drag)</option>
            <option value="single">Single click</option>
            <option value="layered">Layered click</option>
            <option value="path">Path (drag)</option>
          </select>
        </div>
        <div class="check-row blob-vary-row">
          <label class="chk-label" title="Each blob is a unique random shape"><input type="checkbox" id="blob-vary" checked> Vary shapes</label>
        </div>
        <div class="slider-row">
          <label title="Edge jaggedness in pixels (0 = auto-scales with size)">Jag px</label>
          <div class="slider-track"><input type="range" id="blob-perturb" min="0" max="200" value="0"></div>
          <span class="sl-val" id="blob-perturb-val">auto</span>
        </div>

        <div class="section-title section-gap">STAMPS</div>
        <div class="form-row">
          <label>Shape</label>
          <select id="stamp-type" title="Stamp shape template">
            <option value="organic">Organic Blob</option>
            <option value="elongated">Elongated</option>
            <option value="brick">Brick</option>
            <option value="digital">Digital (Pixel)</option>
            <option value="splatter">Splatter</option>
          </select>
        </div>
        <div class="check-row" style="margin-bottom:6px">
          <label class="chk-label" title="Hard solid silhouette (off = soft falloff)"><input type="checkbox" id="stamp-hard" checked> Hard edge</label>
        </div>
        <div class="stamp-controls">
          <button id="btn-gen-stamp" title="Bake a random shape into a reusable stamp">+ New</button>
          <button id="btn-import-stamp" title="Import an image as a stamp">Import</button>
          <button id="btn-clear-stamp" title="Go back to procedural blobs">Procedural</button>
        </div>
        <input type="file" id="stamp-file" accept="image/*" style="display:none">
        <div id="stamp-library"></div>
        <div class="check-row stamp-rot-row">
          <label class="chk-label" title="Random rotation per click"><input type="checkbox" id="stamp-randrot" checked> Rand rotate</label>
        </div>

        <div class="section-title section-gap">SPRAY TOOL</div>
        <div class="form-row">
          <label>Type</label>
          <select id="spray-type">
            <option value="uniform">Uniform</option>
            <option value="cluster">Cluster</option>
            <option value="splatter">Splatter</option>
          </select>
        </div>

        <div class="section-title section-gap">SHAPE TOOL</div>
        <div class="form-row">
          <label>Type</label>
          <select id="shape-mode" title="Rectangle/Ellipse -- applies when Rect tool is active">
            <option value="rect">Rectangle</option>
            <option value="ellipse">Ellipse</option>
          </select>
        </div>
        <div class="check-row">
          <label class="chk-label"><input type="checkbox" id="shape-filled"> Filled</label>
        </div>

        <div class="slider-row">
          <label>Size</label>
          <div class="slider-track"><input type="range" id="brush-size" min="1" max="512" value="20"></div>
          <span class="sl-val" id="brush-size-val">20</span>
        </div>
        <div class="slider-row">
          <label>Opacity</label>
          <div class="slider-track"><input type="range" id="brush-opacity" min="5" max="100" value="80"></div>
          <span class="sl-val" id="brush-opacity-val">80%</span>
        </div>
        <div class="slider-row">
          <label>Hard</label>
          <div class="slider-track"><input type="range" id="brush-hardness" min="0" max="100" value="50"></div>
          <span class="sl-val" id="brush-hardness-val">50%</span>
        </div>
        <div class="slider-row">
          <label>Spacing</label>
          <div class="slider-track"><input type="range" id="brush-spacing" min="5" max="100" value="30"></div>
          <span class="sl-val" id="brush-spacing-val">30%</span>
        </div>

        <div class="section-title section-gap">SYMMETRY</div>
        <div class="check-row">
          <label class="chk-label"><input type="checkbox" id="sym-h"> Horizontal</label>
          <label class="chk-label"><input type="checkbox" id="sym-v"> Vertical</label>
        </div>

        <div class="section-title section-gap">SEAMLESS</div>
        <div class="slider-row">
          <label>Feather</label>
          <div class="slider-track"><input type="range" id="seam-feather" min="4" max="64" value="16"></div>
          <span class="sl-val" id="seam-feather-val">16</span>
        </div>
        <div class="btn-stack">
          <button id="btn-auto-seam">Auto-Seam Edges</button>
          <button id="btn-offset-view">Offset View</button>
        </div>

        <div class="section-title section-gap">EXPORT SHEET</div>
        <div class="form-row export-dims">
          <label>Cols</label>
          <input type="number" id="exp-cols" min="1" max="16" value="4">
          <label>Rows</label>
          <input type="number" id="exp-rows" min="1" max="16" value="4">
        </div>
        <div class="btn-stack">
          <button id="btn-export-sheet" class="btn-accent">Export Sheet PNG</button>
          <button id="btn-export-tile">Export Tile PNG</button>
        </div>

        <div class="section-title section-gap">PRINT</div>
        <div class="form-row">
          <label>Paper</label>
          <select id="print-paper">
            <option value="letter">Letter 8.5x11"</option>
            <option value="legal">Legal 8.5x14"</option>
            <option value="tabloid">Tabloid 11x17"</option>
            <option value="a3">A3</option>
            <option value="a4">A4</option>
            <option value="a5">A5</option>
          </select>
        </div>
        <div class="form-row">
          <label>Orient</label>
          <select id="print-orient">
            <option value="portrait">Portrait</option>
            <option value="landscape">Landscape</option>
          </select>
        </div>
        <div class="form-row">
          <label>Tile Size</label>
          <input type="number" id="print-tile-in" min="0.5" max="24" step="0.25" value="4">
          <span class="unit">in</span>
        </div>
        <div class="form-row">
          <label>Bleed</label>
          <input type="checkbox" id="print-bleed" checked>
        </div>
        <div class="btn-stack">
          <button id="btn-print" class="btn-accent">Print Tiled Page</button>
        </div>
      </aside>

    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
